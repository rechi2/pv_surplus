# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Blueprint: Wallbox Phasenumschaltung 3→1                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

blueprint:
  name: "Wallbox – Umschaltung 1-phasig"
  description: >
    Schaltet auf 1-phasig wenn der Ziel-Überschuss den Schwellwert
    für die eingestellte Dauer unterschreitet.
  domain: automation

  input:
    wallbox_frc_entity:
      name: "Wallbox Force-State (frc)"
      selector:
        entity:
          filter:
            - domain: select

    wallbox_psm_entity:
      name: "Wallbox Phasenmodus (psm)"
      selector:
        entity:
          filter:
            - domain: select

    surplus_sensor:
      name: "Ziel-Überschuss Sensor"
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power

    lademodus_entity:
      name: "Lademodus"
      selector:
        entity:
          filter:
            - domain: input_select

    threshold_phase_down:
      name: "Schwellwert Phase-Down (W)"
      description: "Überschuss unter dem auf 1-phasig geschaltet wird."
      default: 3500
      selector:
        number:
          min: 1500
          max: 5000
          step: 100
          unit_of_measurement: "W"

    phase_down_duration:
      name: "Wartezeit (Minuten)"
      default: 5
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "min"

mode: queued
max: 10

trigger:
  - platform: numeric_state
    entity_id: !input surplus_sensor
    below: !input threshold_phase_down
    for:
      minutes: !input phase_down_duration

condition:
  - condition: state
    entity_id: !input lademodus_entity
    state: "PV-Überschuss"
  - condition: state
    entity_id: !input wallbox_psm_entity
    state: "2"

action:
  - service: select.select_option
    target:
      entity_id: !input wallbox_frc_entity
    data:
      option: "1"
  - delay:
      seconds: 5
  - service: select.select_option
    target:
      entity_id: !input wallbox_psm_entity
    data:
      option: "1"
  - delay:
      seconds: 5
  - service: select.select_option
    target:
      entity_id: !input wallbox_frc_entity
    data:
      option: "2"
